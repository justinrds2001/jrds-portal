services:
  app:
    image: ghcr.io/justinrds2001/jrds-portal:latest
    restart: always
    ports:
      - "8000:80"
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: jrds_portal
      DB_USERNAME: sail
      DB_PASSWORD: password

  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_DATABASE: jrds_portal
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: